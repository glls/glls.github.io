<h2 class="relative group">a bit of history
    <div id="a-bit-of-history" class="anchor"></div>
    
</h2>
<p>Git was originally authored by <a href="https://en.wikipedia.org/wiki/Linus_Torvalds" title="Linus Torvalds" target="_blank" rel="noreferrer">Linus Torvalds</a> in 2005 for development of the <a href="https://en.wikipedia.org/wiki/Linux_kernel" title="Linux kernel" target="_blank" rel="noreferrer">Linux kernel</a>, with other kernel developers contributing to its initial development.
Since 2005, Junio Hamano has been the core maintainer.</p>
<hr>
<p><span class="menu-title" style="display: none">a bit of history cont&rsquo;d</span></p>
<p>As with most other <a href="https://en.wikipedia.org/wiki/Distributed_version_control" title="Distributed version control" target="_blank" rel="noreferrer">distributed version control</a> systems, and unlike most client–server systems, every Git <a href="https://en.wikipedia.org/wiki/Directory_%28computing%29" title="Directory (computing)" target="_blank" rel="noreferrer">directory</a> on every <a href="https://en.wikipedia.org/wiki/Node_%28networking%29" title="Node (networking)" target="_blank" rel="noreferrer">computer</a> is a full-fledged <a href="https://en.wikipedia.org/wiki/Repository_%28version_control%29" title="Repository (version control)" target="_blank" rel="noreferrer">repository</a> with complete history and full version-tracking abilities, independent of network access or a central server.</p>
<p>Git is <a href="https://en.wikipedia.org/wiki/Free_and_open-source_software" title="Free and open-source software" target="_blank" rel="noreferrer">free and open-source software</a> distributed under the <a href="https://en.wikipedia.org/wiki/GNU_General_Public_License" title="GNU General Public License" target="_blank" rel="noreferrer">GPL-2.0-only</a> license.</p>

<h1 class="relative group">Glossary
    <div id="glossary" class="anchor"></div>
    
</h1>
<table>
  <thead>
      <tr>
          <th></th>
          <th></th>
      </tr>
  </thead>
  <tbody>
      <tr>
          <td><strong>Working directory - repo</strong></td>
          <td>the working directory is the folder on your system that you want to track. Where you develop your project. Everything git related is inside the <code>.git</code> folder. Serverless.</td>
      </tr>
      <tr>
          <td>Remote repository</td>
          <td>Remote repositories are versions of your project that are hosted elsewhere. You can have several of them, each one is either RO or RW for you.</td>
      </tr>
  </tbody>
</table>
<hr>
<table>
  <thead>
      <tr>
          <th></th>
          <th></th>
      </tr>
  </thead>
  <tbody>
      <tr>
          <td><strong>Git files</strong></td>
          <td>Inside the working directory and beneath, you might find some git related files</td>
      </tr>
      <tr>
          <td><strong>.gitattributes</strong></td>
          <td>how to handle files</td>
      </tr>
      <tr>
          <td><strong>.gitignore</strong></td>
          <td>what to ignore</td>
      </tr>
      <tr>
          <td><strong>.gitkeep</strong></td>
          <td>keep an empty dir</td>
      </tr>
  </tbody>
</table>
<hr>
<dl>
<dt><strong>Tracked files</strong></dt>
<dd>Tracked files are the files in the working directory (repository) that Git manages.</dd>
</dl>
<p>.</p>
<dl>
<dt><em>The Staging Area</em>*</dt>
<dd>The intermediary between the working directory and the project history.</dd>
</dl>
<hr>
<dl>
<dt><strong>Commit</strong></dt>
<dd>Commit is the process of adding any changes in tracked files. Git will keep track of all the changes in the <strong>Committed History</strong>.</dd>
</dl>
<p>.</p>
<dl>
<dt><em>Commit message</em>*</dt>
<dd>The commit message is a summary and description of a commit action.</dd>
</dl>
<hr>
<dl>
<dt><strong>Branches</strong> (develop, feature, master)</dt>
<dd>A branch is a set of the repo tracked files. Git allows you to compare and merge branches. It can also be used to organize collaboration inside the repo, fix specific bugs, or create new features.</dd>
</dl>
<p>.</p>
<dl>
<dt><em>Merge</em>*</dt>
<dd>Copy code changes from one branch to another.</dd>
</dl>
<hr>
<p><em>(not really git)</em></p>
<dl>
<dt><strong>Fork</strong></dt>
<dd>You clone a public repo, make changes and contribute back with a PR.</dd>
</dl>
<p>.</p>
<dl>
<dt><em>Pull/Merge request (PR)</em>*</dt>
<dd>A PR is a request to the repository owner to merge your changes back into the original code base.</dd>
</dl>
</section>

<h1 class="relative group">git init
    <div id="git-init" class="anchor"></div>
    
</h1>
<p>Install <a href="https://git-scm.com/"  target="_blank" rel="noreferrer">git</a>, then</p>
<div class="highlight-wrapper"><div class="highlight"><pre tabindex="0" class="chroma"><code class="language-sh" data-lang="sh"><span class="line"><span class="cl">git config --global user.name <span class="s2">&#34;John Smith&#34;</span>
</span></span><span class="line"><span class="cl">git config --global user.email john@example.com
</span></span><span class="line"><span class="cl">git config --global init.defaultBranch main</span></span></code></pre></div></div>
<p>Create a new folder for your project and add a file under version control</p>
<div class="highlight-wrapper"><div class="highlight"><pre tabindex="0" class="chroma"><code class="language-sh" data-lang="sh"><span class="line"><span class="cl">mkdir -p ~/projects/git-test
</span></span><span class="line"><span class="cl"><span class="nb">cd</span> ~/projects/git-test
</span></span><span class="line"><span class="cl">git init
</span></span><span class="line"><span class="cl">nano new_file
</span></span><span class="line"><span class="cl">git add .</span></span></code></pre></div></div>
<hr>
<p>Commit the changes</p>
<div class="highlight-wrapper"><div class="highlight"><pre tabindex="0" class="chroma"><code class="language-console" data-lang="console"><span class="line"><span class="cl"><span class="gp">$</span> git commit -m <span class="s2">&#34;Initial commit&#34;</span>
</span></span><span class="line"><span class="cl"><span class="go">[master (root-commit) 19632d1] Add new file
</span></span></span><span class="line"><span class="cl"><span class="go"> 1 file changed, 1 insertion(+)
</span></span></span><span class="line"><span class="cl"><span class="go"> create mode 100644 new-file
</span></span></span></code></pre></div></div>
<p>every commit is unique, it contains:</p>
<p>snapshot of the project (a tree with a compressed blob for each file),
ser information,ate,
ommit message,HA-1 checksum.</p>
<div class="highlight-wrapper"><div class="highlight"><pre tabindex="0" class="chroma"><code class="language-console" data-lang="console"><span class="line"><span class="cl"><span class="gp">$</span> git log
</span></span><span class="line"><span class="cl"><span class="go">commit 81752cd6a514fd2595c40f27c783d6887f84e6e6
</span></span></span><span class="line"><span class="cl"><span class="go">Author: John Smith &lt;john@example.com&gt;
</span></span></span><span class="line"><span class="cl"><span class="go">Date:   Thu Apr 7 15:17:45 2022 +0000
</span></span></span><span class="line"><span class="cl"><span class="err">
</span></span></span><span class="line"><span class="cl"><span class="go">    Initial commit
</span></span></span></code></pre></div></div>

<dl>

<dd><code>git cherry-pick</code> lets you select a commit from a branch to apply it to another branch.</dd>

<dd>Git has the option to tag a commit in the repository so that you find it easier or mark an app version on a commit.</dd>
</dl>
<div class="highlight-wrapper"><div class="highlight"><pre tabindex="0" class="chroma"><code class="language-text" data-lang="text"><span class="line"><span class="cl">git tag 1.0.0 -m &#39;Release 1.0.0&#39;</span></span></code></pre></div></div>
<hr>
<dl>
<dt>Stashing your changes</dt>
<dd><code>git stash</code> allows you to save the current state of the local repository and restore it later.</dd>
<dt>Creating a patch</dt>
<dd><code>git format-patch</code> command is useful to transfer a commit
to another repository</dd>
</dl>

<h2 class="relative group">Semantic Commit Messages
    <div id="semantic-commit-messages" class="anchor"></div>
    
</h2>
<p>See how a minor change to your commit message style can make you a better programmer.</p>
<p>Format: <code>&lt;type&gt;(&lt;scope&gt;): &lt;subject&gt;</code></p>
<p><code>&lt;scope&gt;</code> is optional</p>

<h3 class="relative group">Example
    <div id="example" class="anchor"></div>
    
</h3>
<div class="highlight-wrapper"><div class="highlight"><pre tabindex="0" class="chroma"><code class="language-text" data-lang="text"><span class="line"><span class="cl">feat: add hat wobble
</span></span><span class="line"><span class="cl">^--^  ^------------^
</span></span><span class="line"><span class="cl">|     |
</span></span><span class="line"><span class="cl">|     +-&gt; Summary in present tense.
</span></span><span class="line"><span class="cl">|
</span></span><span class="line"><span class="cl">+-------&gt; Type: chore, docs, feat, fix, refactor, style, or test.</span></span></code></pre></div></div>
<hr>

<h3 class="relative group">More Examples
    <div id="more-examples" class="anchor"></div>
    
</h3>
<ul>
<li><code>feat</code>: (new feature for the user, not a new feature for build script)</li>
<li><code>fix</code>: (bug fix for the user, not a fix to a build script)</li>
<li><code>docs</code>: (changes to the documentation)</li>
<li><code>style</code>: (formatting, missing semi colons, etc; no production code change)</li>
<li><code>refactor</code>: (refactoring production code, eg. renaming a variable)</li>
<li><code>test</code>: (adding missing tests, refactoring tests; no production code change)</li>
<li><code>chore</code>: (updating grunt tasks etc; no production code change)</li>
</ul>
